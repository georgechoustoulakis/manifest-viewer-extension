<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HLS Manifest Viewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div class="app">

    <nav class="navbar">
      <button id="back-btn" class="nav-btn nav-btn--icon" title="Go back" disabled>&#8592;</button>
      <div class="url-bar-wrap">
        <span class="url-bar-icon">&#9654;</span>
        <input
          type="url"
          id="url-bar"
          class="url-bar"
          placeholder="https://example.com/manifest.m3u8 · .m3u · .mpd"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
      <button id="go-btn" class="nav-btn">Go</button>
      <button id="copy-btn" class="nav-btn">Copy</button>
      <button id="raw-btn" class="nav-btn">Raw</button>
      <button id="download-btn" class="nav-btn nav-btn--download" title="Download manifest" disabled>&#8595;</button>
    </nav>

    <div id="breadcrumbs" class="breadcrumbs" hidden></div>

    <div class="status-bar">
      <span id="status-text" class="status-text"></span>
      <span id="status-meta" class="status-meta"></span>
    </div>

    <main class="content-wrap">
      <pre id="manifest-content" class="manifest-content"></pre>
    </main>

  </div>
  <script src="viewer.js"></script>
</body>
</html>
